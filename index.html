<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator ile dni od urodzin</title>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <h1 class="text-2xl font-bold text-primary mb-6">
        Kalkulator ile dni od urodzin
      </h1>

      <form id="birthday-form" class="flex flex-col gap-4">
        <input
          id="birthday"
          type="date"
          required
          class="border border-gray-300 rounded-lg p-3"
        />

        <button
          type="submit"
          class="bg-blue-300 p-4 rounded-lg font-semibold hover:opacity-90 transition"
        >
          Sprawdź
        </button>
      </form>
    </div>

    <dialog
      id="result-dialog"
      class="bg-gray-200 text-red-600 p-6 rounded-xl relative"
    >
      <button
        id="close-dialog"
        class="absolute top-2 right-3 text-black text-xl font-bold"
      >
        x
      </button>

      <p id="result-text" class="text-lg"></p>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
