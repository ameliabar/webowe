<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator ile dni od urodzin</title>
  </head>
  <body>
    <h1 class="text-2xl font-bold text-primary">Kalkulator ile dni minęło od urodzin</h1>

    <form id="form">
      <label for="day">Dzień:</label>
      <input type="number" id="day" min="1" max="31" required />

      <label for="month">Miesiąc:</label>
      <input type="number" id="month" min="1" max="12" required />

      <button type="submit" class="bg-blue-300 p-4">Oblicz</button>
    </form>

    <dialog id="dialog">
      <button id="close">X</button>
      <p id="result" class="text-red-600"></p>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
