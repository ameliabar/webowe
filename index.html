<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
    <title>Artykuły Supabase!</title>
  </head>

  <body class="bg-gray-100 text-gray-900">

    <main class="max-w-4xl mx-auto p-6">

      <section class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-pink-500">
          Artykuły z Supabase
        </h1>
      </section>

      <!-- DO sortowania -->
      <section class="mb-8">
        <select id="sortSelect"
                class="w-full p-3 border rounded bg-white">
          <option value="date_asc">Po dacie rosnąco</option>
          <option value="date_desc">Po dacie malejąco</option>
          <option value="title_asc">Po nazwie alfabetycznie</option>
        </select>
      </section>

      <!-- lista artykulow -->
      <section class="mb-12">
        <div id="articles" class="space-y-6"></div>
      </section>

      <!-- tu bedzie na formsa -->
      <section>
        <h2 class="text-2xl font-bold mb-4">
          Dodaj artykuł
        </h2>

        <form id="articleForm"
              class="bg-white p-6 rounded-lg shadow space-y-4">

          <input id="title"
                 placeholder="Tytuł"
                 class="w-full border p-3 rounded"
                 required />

          <input id="subtitle"
                 placeholder="Podtytuł"
                 class="w-full border p-3 rounded"
                 required />

          <input id="author"
                 placeholder="Autor"
                 class="w-full border p-3 rounded"
                 required />

          <input id="created_at"
                 type="date"
                 class="w-full border p-3 rounded"
                 required />

          <textarea id="content"
                    placeholder="Treść"
                    class="w-full border p-3 rounded"
                    rows="5"
                    required></textarea>

          <button class="bg-pink-500 text-white px-6 py-3 rounded hover:bg-pink-600">
            Dodaj
          </button>

        </form>
      </section>

    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
